name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.njsproj'
      - '**/*.esproj'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.njsproj'
      - '**/*.esproj'
  schedule:
    - cron: '36 9 * * 4'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Use `none` build mode to avoid fragile autobuild detection in the mixed
          # .NET + frontend repo layout. GitHub Docs notes that C# supports this mode.
          - language: csharp
            build-mode: none
          - language: javascript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
