name: .NET Core build

on:
  push:
    branches: [ master ]
    paths: [IoTSharp.*/**,IoTSharp/**]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: InferSharp
        uses: microsoft/infersharpaction@v0.2
      - name: Setup .NET Core SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      # Build the main application and its referenced projects only.
      # We intentionally avoid solution-wide build/test here because the solution
      # now contains the Windows WiX installer project, which is not part of the
      # Linux CI validation path for normal repository pushes.
      - name: Restore IoTSharp
        run: dotnet restore ./IoTSharp/IoTSharp.csproj
      - name: Build IoTSharp
        run: dotnet build ./IoTSharp/IoTSharp.csproj --configuration Release --no-restore
      - name: Restore IoTSharp tests
        run: dotnet restore ./IoTSharp.Test/IoTSharp.Test.csproj
      - name: Test IoTSharp
        run: dotnet test ./IoTSharp.Test/IoTSharp.Test.csproj --configuration Release --no-restore --verbosity normal
      - name: Restore IoTSharp.Interpreter tests
        run: dotnet restore ./IoTSharp.Interpreter.Test/IoTSharp.Interpreter.Test.csproj
      - name: Test IoTSharp.Interpreter
        run: dotnet test ./IoTSharp.Interpreter.Test/IoTSharp.Interpreter.Test.csproj --configuration Release --no-restore --verbosity normal


      
      
