name: Release Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  APP_PROJECT: IoTSharp/IoTSharp.csproj

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      msi_version: ${{ steps.version.outputs.msi_version }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Release tags must follow v<major>.<minor>.<patch> or v<major>.<minor>.<patch>.<revision>." >&2
            exit 1
          fi

          if [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            MSI_VERSION="${VERSION}.0"
          else
            MSI_VERSION="${VERSION}"
          fi

          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "msi_version=${MSI_VERSION}" >> "$GITHUB_OUTPUT"

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ClientApp/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.11.2 --no-progress -y
          $wixPath = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset v*' |
            Sort-Object Name -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $wixPath) {
            throw 'WiX Toolset installation directory was not found.'
          }

          "WIX_INSTALL_PATH=$wixPath\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore Windows package assets
        run: dotnet restore ${{ env.APP_PROJECT }} --runtime win-x64

      - name: Create Windows packages
        shell: pwsh
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          MSI_VERSION: ${{ needs.prepare.outputs.msi_version }}
        run: |
          $packageDir = Join-Path $env:RUNNER_TEMP 'packages\windows'
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          $zipPath = Join-Path $packageDir ("IoTSharp-$env:RELEASE_VERSION-win-x64.zip")
          $msiPath = Join-Path $packageDir ("IoTSharp-$env:RELEASE_VERSION-win-x64.msi")
          $arguments = @(
            'msbuild',
            $env:APP_PROJECT,
            '/t:CreateZip;Msi',
            '/p:Configuration=Release',
            '/p:RuntimeIdentifier=win-x64',
            '/p:SelfContained=true',
            '/p:UseAppHost=true',
            "/p:Version=$env:RELEASE_VERSION",
            "/p:PackageVersion=$env:RELEASE_VERSION",
            "/p:InformationalVersion=$env:RELEASE_VERSION",
            "/p:SetupProductVersion=$env:MSI_VERSION",
            "/p:PackageDir=$packageDir\\",
            "/p:ZipPath=$zipPath",
            "/p:SetupFilePath=$msiPath",
            "/p:WixInstallPath=$env:WIX_INSTALL_PATH"
          )

          & dotnet @arguments

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: ${{ runner.temp }}/packages/windows/*
          if-no-files-found: error

  package-linux:
    name: Package ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: centos
            target: CreateRpm
            package_suffix: centos-x64
            package_extension: rpm
            package_path_property: RpmPath
            package_arch_property: RpmPackageArchitecture
            package_arch_value: x86_64
            artifact_name: release-centos
          - name: debian-ubuntu
            target: CreateDeb
            package_suffix: debian-ubuntu-x64
            package_extension: deb
            package_path_property: DebPath
            package_arch_property: DebPackageArchitecture
            package_arch_value: amd64
            artifact_name: release-debian-ubuntu
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ClientApp/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Linux package assets
        run: dotnet restore ${{ env.APP_PROJECT }} --runtime linux-x64

      - name: Create ${{ matrix.name }} package
        shell: bash
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
          PACKAGE_SUFFIX: ${{ matrix.package_suffix }}
          PACKAGE_EXTENSION: ${{ matrix.package_extension }}
          PACKAGE_PATH_PROPERTY: ${{ matrix.package_path_property }}
          PACKAGE_ARCH_PROPERTY: ${{ matrix.package_arch_property }}
          PACKAGE_ARCH_VALUE: ${{ matrix.package_arch_value }}
          PACKAGE_TARGET: ${{ matrix.target }}
        run: |
          PACKAGE_DIR="${RUNNER_TEMP}/packages/${{ matrix.name }}"
          PACKAGE_FILENAME="IoTSharp-${RELEASE_VERSION}-${PACKAGE_SUFFIX}.${PACKAGE_EXTENSION}"
          PACKAGE_PATH="${PACKAGE_DIR}/${PACKAGE_FILENAME}"
          mkdir -p "${PACKAGE_DIR}"
          args=(
            msbuild
            "${APP_PROJECT}"
            "/t:${PACKAGE_TARGET}"
            /p:Configuration=Release
            /p:RuntimeIdentifier=linux-x64
            /p:SelfContained=true
            /p:UseAppHost=true
            "/p:Version=${RELEASE_VERSION}"
            "/p:PackageVersion=${RELEASE_VERSION}"
            "/p:InformationalVersion=${RELEASE_VERSION}"
            "/p:PackageDir=${PACKAGE_DIR}/"
            "/p:${PACKAGE_ARCH_PROPERTY}=${PACKAGE_ARCH_VALUE}"
          )

          if [[ "${PACKAGE_TARGET}" != "CreateDeb" ]]; then
            args+=("/p:${PACKAGE_PATH_PROPERTY}=${PACKAGE_PATH}")
          fi

          dotnet "${args[@]}"

          if [[ "${PACKAGE_TARGET}" == "CreateDeb" ]]; then
            mv "${PACKAGE_DIR}/iotsharp.${RELEASE_VERSION}.linux-x64.deb" "${PACKAGE_PATH}"
          fi

      - name: Upload ${{ matrix.name }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/packages/${{ matrix.name }}/*
          if-no-files-found: error

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ClientApp/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore macOS package assets
        run: dotnet restore ${{ env.APP_PROJECT }} --runtime osx-x64

      - name: Create macOS package
        shell: bash
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          PACKAGE_DIR="${RUNNER_TEMP}/packages/macos"
          TARBALL_PATH="${PACKAGE_DIR}/IoTSharp-${RELEASE_VERSION}-osx-x64.tar.gz"
          mkdir -p "${PACKAGE_DIR}"

          dotnet msbuild "${APP_PROJECT}" \
            /t:CreateTarball \
            /p:Configuration=Release \
            /p:RuntimeIdentifier=osx-x64 \
            /p:SelfContained=true \
            /p:UseAppHost=true \
            "/p:Version=${RELEASE_VERSION}" \
            "/p:PackageVersion=${RELEASE_VERSION}" \
            "/p:InformationalVersion=${RELEASE_VERSION}" \
            "/p:PackageDir=${PACKAGE_DIR}/" \
            "/p:TarballPath=${TARBALL_PATH}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ${{ runner.temp }}/packages/macos/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - package-windows
      - package-linux
      - package-macos
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ needs.prepare.outputs.release_version }}
          generate_release_notes: true
          files: ${{ runner.temp }}/release-assets/**/*
