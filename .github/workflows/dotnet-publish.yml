name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-assets:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive_format: zip
          - rid: win-x86
            archive_format: zip
          - rid: linux-x64
            archive_format: tar.gz
          - rid: linux-arm
            archive_format: tar.gz
          - rid: linux-arm64
            archive_format: tar.gz
          - rid: linux-loongarch64
            archive_format: tar.gz
          - rid: osx-x64
            archive_format: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ClientApp/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "release_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Restore solution
        run: dotnet restore IoTSharp.sln

      # Build self-contained archives for the exact release tag and RID.
      - name: Publish ${{ matrix.rid }}
        shell: bash
        env:
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/publish/${{ matrix.rid }}"
          dotnet publish IoTSharp/IoTSharp.csproj \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            --output "${OUTPUT_DIR}" \
            -p:ContinuousIntegrationBuild=true \
            -p:Version="${RELEASE_VERSION}" \
            -p:PackageVersion="${RELEASE_VERSION}" \
            -p:InformationalVersion="${RELEASE_VERSION}" \
            -p:UseAppHost=true

      - name: Archive ${{ matrix.rid }}
        id: archive
        shell: bash
        run: |
          SOURCE_DIR="${RUNNER_TEMP}/publish/${{ matrix.rid }}"
          ASSET_DIR="${RUNNER_TEMP}/release-assets"
          BASE_NAME="IoTSharp-${RELEASE_VERSION}-${{ matrix.rid }}"
          mkdir -p "${ASSET_DIR}"

          if [[ "${{ matrix.archive_format }}" == "zip" ]]; then
            (cd "${SOURCE_DIR}" && zip -r "${ASSET_DIR}/${BASE_NAME}.zip" .)
            echo "asset_path=${ASSET_DIR}/${BASE_NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -C "${SOURCE_DIR}" -czf "${ASSET_DIR}/${BASE_NAME}.tar.gz" .
            echo "asset_path=${ASSET_DIR}/${BASE_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload archived asset
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: ${{ steps.archive.outputs.asset_path }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ runner.temp }}/release-assets/*
