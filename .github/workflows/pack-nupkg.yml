name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  pack-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "package_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "PACKAGE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Validate release secrets
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "${NUGET_API_KEY}" ]]; then
            echo "NUGET_API_KEY is required for tag releases." >&2
            exit 1
          fi

      - name: Restore solution
        run: dotnet restore IoTSharp.sln

      - name: Verify formatting
        run: dotnet format IoTSharp.sln --verify-no-changes --no-restore

      - name: Pack publishable projects
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/nupkg"
          mapfile -t projects < <(git grep -l '<GeneratePackageOnBuild>true</GeneratePackageOnBuild>' -- '*.csproj' | sort)
          projects+=("IoTSharp.Data.JsonDB/IoTSharp.Data.JsonDB.csproj")

          for project in "${projects[@]}"; do
            dotnet pack "${project}" \
              --configuration Release \
              --output "${RUNNER_TEMP}/nupkg" \
              --no-restore \
              --include-symbols \
              --include-source \
              -p:ContinuousIntegrationBuild=true \
              -p:Version="${PACKAGE_VERSION}" \
              -p:PackageVersion="${PACKAGE_VERSION}" \
              -p:InformationalVersion="${PACKAGE_VERSION}"
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ${{ runner.temp }}/nupkg/*.nupkg
            ${{ runner.temp }}/nupkg/*.snupkg
          if-no-files-found: error

      - name: Publish to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          shopt -s nullglob
          for pkg in "${RUNNER_TEMP}"/nupkg/*.nupkg; do
            if [[ "${pkg}" == *.symbols.nupkg ]]; then
              continue
            fi

            dotnet nuget push "${pkg}" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "${NUGET_API_KEY}" \
              --skip-duplicate
          done

      - name: Publish to GitHub Packages
        shell: bash
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          for pkg in "${RUNNER_TEMP}"/nupkg/*.nupkg; do
            if [[ "${pkg}" == *.symbols.nupkg ]]; then
              continue
            fi

            dotnet nuget push "${pkg}" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --api-key "${GITHUB_PACKAGES_TOKEN}" \
              --skip-duplicate
          done
