
services:
  pg_iotsharp_db:
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_USER: ${PG_IOTSHARP_POSTGRES_USER:-postgres}
      POSTGRES_DB: ${PG_IOTSHARP_POSTGRES_DB:-IoTSharp}
      POSTGRES_PASSWORD: ${PG_IOTSHARP_POSTGRES_PASSWORD:-iotsharp_pg_dev_password_change_me}
    ports:
      - "${PG_IOTSHARP_DB_PORT:-5432}:5432"
    volumes:
      - pg_iotsharp_db_data:/var/lib/postgresql
    networks:
      - iotsharp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  pg_iotsharp:
    image: ${IOTSHARP_IMAGE:-registry.uixe.net/iotsharp/iotsharp:latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IoTSharp: Server=pg_iotsharp_db;Database=${PG_IOTSHARP_POSTGRES_DB:-IoTSharp};Username=${PG_IOTSHARP_POSTGRES_USER:-postgres};Password=${PG_IOTSHARP_POSTGRES_PASSWORD:-iotsharp_pg_dev_password_change_me};Pooling=true;MaxPoolSize=1024;
      ConnectionStrings__TelemetryStorage: Server=pg_iotsharp_db;Database=${PG_IOTSHARP_POSTGRES_DB:-IoTSharp};Username=${PG_IOTSHARP_POSTGRES_USER:-postgres};Password=${PG_IOTSHARP_POSTGRES_PASSWORD:-iotsharp_pg_dev_password_change_me};Pooling=true;MaxPoolSize=1024;
      ConnectionStrings__EventBusStore: ""
      ConnectionStrings__EventBusMQ: ""
      DataBase: PostgreSql
      TelemetryStorage: TimescaleDB
      EventBus: CAP
      EventBusStore: InMemory
      EventBusMQ: InMemory
      CachingUseIn: InMemory
    depends_on:
      pg_iotsharp_db:
        condition: service_healthy
    ports:
      - "${PG_IOTSHARP_HTTP_PORT:-2927}:8080"
      - "${PG_IOTSHARP_MQTT_PORT:-1883}:1883"
      - "${PG_IOTSHARP_MQTTS_PORT:-8883}:8883"
      - "${PG_IOTSHARP_COAP_PORT:-5683}:5683"
      - "${PG_IOTSHARP_COAPS_PORT:-5684}:5684"
      - "${PG_IOTSHARP_MODBUS_PORT:-502}:502"
    volumes:
      - ./appsettings.Development.json:/app/appsettings.Development.json:ro
      - pg_iotsharp_security:/app/security
    networks:
      - iotsharp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  sonnetdb:
    image: ${SONNETDB_IMAGE:-registry.uixe.net/iotsharp/sonnetdb:latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SONNETDB_SonnetDBServer__DataRoot: /data
      SONNETDB_SonnetDBServer__AutoLoadExistingDatabases: "true"
      SONNETDB_SonnetDBServer__AllowAnonymousProbes: "true"
      SONNETDB_SonnetDBServer__Tokens__iotsharp_sonnetdb_dev_token_change_me: admin
    ports:
      - "${SONNETDB_PORT:-5080}:5080"
    volumes:
      - sonnetdb_data:/data
    networks:
      - iotsharp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  sonnetdb_iotsharp:
    image: ${IOTSHARP_IMAGE:-registry.uixe.net/iotsharp/iotsharp:latest}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      ASPNETCORE_ENVIRONMENT: SonnetDB
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IoTSharp: Data Source=sonnetdb+http://sonnetdb:5080/iotsharp;Token=iotsharp_sonnetdb_dev_token_change_me;Timeout=100
      ConnectionStrings__TelemetryStorage: Data Source=sonnetdb+http://sonnetdb:5080/telemetry;Token=iotsharp_sonnetdb_dev_token_change_me;Timeout=100;Measurement=TelemetryData;AutoCreate=true
      CachingUseSonnetDBConnectionString: Data Source=sonnetdb+http://sonnetdb:5080/cache;Token=iotsharp_sonnetdb_dev_token_change_me;Timeout=100
      ConnectionStrings__BlobStorage: sonnetdb://blob?bucket=iotsharp-blob-storage&connectionString=Data%20Source%3Dsonnetdb%2Bhttp%3A%2F%2Fsonnetdb%3A5080%2Fobjects%3BToken%3Diotsharp_sonnetdb_dev_token_change_me%3BTimeout%3D100
      ConnectionStrings__EventBusMQ: Data Source=sonnetdb+http://sonnetdb:5080/events;Token=iotsharp_sonnetdb_dev_token_change_me;Timeout=100
      DataBase: SonnetDB
      TelemetryStorage: SonnetDB
      CachingUseIn: SonnetDB
      EventBus: SonnetMQ
      EventBusStore: InMemory
      EventBusMQ: SonnetMQ
    depends_on:
      sonnetdb:
        condition: service_healthy
    ports:
      - "${SONNETDB_IOTSHARP_HTTP_PORT:-3927}:8080"
      - "${SONNETDB_IOTSHARP_MQTT_PORT:-2883}:1883"
      - "${SONNETDB_IOTSHARP_MQTTS_PORT:-9883}:8883"
      - "${SONNETDB_IOTSHARP_COAP_PORT:-6683}:5683"
      - "${SONNETDB_IOTSHARP_COAPS_PORT:-6684}:5684"
      - "${SONNETDB_IOTSHARP_MODBUS_PORT:-1502}:502"
    volumes:
      - ./appsettings.SonnetDB.json:/app/appsettings.SonnetDB.json:ro
      - sonnetdb_iotsharp_security:/app/security
    networks:
      - iotsharp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

networks:
  iotsharp-network:
    driver: bridge

volumes:
  pg_iotsharp_db_data:
  pg_iotsharp_security:
  sonnetdb_data:
  sonnetdb_iotsharp_security:
